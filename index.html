<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#eaf1fb">
<title>返信できた！ — 返信トラッカー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #eef4fc;
    --bg2: #f7fafe;
    --card: #ffffff;
    --ink: #1f2a37;
    --ink-soft: #5a6b7b;
    --ink-faint: #93a3b3;
    --line: #e2eaf3;
    --blue: #4a90d9;
    --blue-strong: #2f77c4;
    --blue-soft: #a9cbef;
    --blue-bg: #e8f1fc;
    --track: #eef3f9;
    --shadow: 0 8px 30px rgba(47,119,196,0.10);
    --danger: #d9694f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { background: var(--bg); }
  button { -webkit-tap-highlight-color: rgba(74,144,217,0.2); touch-action: manipulation; font-family: inherit; }
  body {
    background: linear-gradient(180deg, #eef4fc 0%, #f7fafe 100%);
    background-attachment: fixed;
    color: var(--ink);
    font-family: 'Noto Sans JP', system-ui, -apple-system, 'Hiragino Kaku Gothic ProN', 'Yu Gothic', Meiryo, sans-serif;
    font-weight: 400;
    min-height: 100vh;
    padding: 32px 18px 80px;
    -webkit-text-size-adjust: 100%;
    overflow-x: hidden;
    line-height: 1.7;
  }

  .wrap { max-width: 680px; margin: 0 auto; }

  header { text-align: center; margin-bottom: 24px; }
  .eyebrow {
    display: inline-block;
    font-size: 12px; font-weight: 500; letter-spacing: 0.08em;
    color: var(--blue-strong); background: var(--blue-bg);
    padding: 5px 14px; border-radius: 999px;
  }
  h1 {
    font-weight: 700; font-size: 30px; margin-top: 14px; color: var(--ink);
    letter-spacing: 0.01em;
  }

  /* 合計（主役） */
  .hero {
    background: var(--card); border: 1px solid var(--line); border-radius: 18px;
    box-shadow: var(--shadow); text-align: center;
    padding: 30px 22px 26px; margin-bottom: 20px;
  }
  .hero-label { font-size: 13px; font-weight: 500; color: var(--ink-soft); margin-bottom: 6px; }
  .hero-num-row { display: flex; align-items: baseline; justify-content: center; gap: 6px; }
  .hero-num {
    font-size: 76px; line-height: 1; font-weight: 700; color: var(--blue-strong);
    letter-spacing: -0.02em;
    transition: transform .18s cubic-bezier(.2,1.4,.4,1);
    display: inline-block;
    font-variant-numeric: tabular-nums;
  }
  .hero-num.pop { transform: scale(1.12); }
  .hero-unit { font-size: 24px; font-weight: 500; color: var(--ink-soft); }
  .hero-sub { font-size: 14px; color: var(--ink-soft); margin-top: 14px; font-weight: 500; }

  /* ボタン */
  .btn-zone { position: relative; text-align: center; margin-bottom: 22px; }
  .reply-btn {
    position: relative;
    background: linear-gradient(180deg, #5a9be0, #3f83cf);
    border: none;
    color: #fff;
    font-weight: 700;
    font-size: 19px;
    letter-spacing: 0.06em;
    padding: 20px 20px;
    width: 100%;
    border-radius: 14px;
    cursor: pointer;
    transition: transform .12s ease, box-shadow .3s ease, filter .2s ease;
    box-shadow: 0 10px 24px rgba(47,119,196,0.28);
  }
  .reply-btn:hover { filter: brightness(1.04); box-shadow: 0 12px 30px rgba(47,119,196,0.34); }
  .reply-btn:active { transform: scale(0.98); }
  .reply-btn .ico { margin-right: 8px; }
  .reply-btn.flash { animation: flash .5s ease; }
  @keyframes flash {
    0% { box-shadow: 0 0 0 0 rgba(74,144,217,0.45); }
    100% { box-shadow: 0 0 0 24px rgba(74,144,217,0); }
  }
  .undo {
    display: inline-block; margin-top: 14px;
    background: none; border: none; cursor: pointer;
    font-size: 13px; font-weight: 500; color: var(--ink-faint);
    transition: color .2s ease;
  }
  .undo:hover { color: var(--blue-strong); }
  .undo:disabled { opacity: 0.45; cursor: default; }
  .undo:disabled:hover { color: var(--ink-faint); }

  /* 浮かぶ +1 */
  .float1 {
    position: absolute; left: 50%; top: 4px; transform: translateX(-50%);
    font-size: 30px; font-weight: 700; color: var(--blue-strong);
    pointer-events: none; opacity: 0;
  }
  .float1.go { animation: rise 1s ease-out forwards; }
  @keyframes rise {
    0% { opacity: 0; transform: translate(-50%, 4px) scale(0.8); }
    18% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -52px) scale(1.05); }
  }

  /* 統計カード */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    box-shadow: var(--shadow); padding: 18px 10px; text-align: center;
  }
  .stat .n { font-size: 34px; line-height: 1; font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; }
  .stat.accent .n { color: var(--blue-strong); }
  .stat .l { font-size: 12px; font-weight: 500; color: var(--ink-soft); margin-top: 9px; }

  /* グラフ */
  .chart-card {
    background: var(--card); border: 1px solid var(--line); border-radius: 18px;
    box-shadow: var(--shadow); padding: 22px 18px 16px;
  }
  .chart-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
  .chart-head h2 { font-size: 15px; font-weight: 700; color: var(--ink); }
  .rangebar { display: flex; background: var(--track); border-radius: 10px; padding: 3px; }
  .rangebar button {
    background: transparent; border: none; color: var(--ink-soft);
    font-size: 13px; font-weight: 500; padding: 6px 14px; cursor: pointer;
    border-radius: 8px; transition: all .18s ease;
  }
  .rangebar button.active { background: #fff; color: var(--blue-strong); box-shadow: 0 1px 4px rgba(47,119,196,0.14); }
  svg { width: 100%; height: auto; display: block; overflow: visible; }

  .bar { transition: height .4s cubic-bezier(.2,.9,.3,1), y .4s cubic-bezier(.2,.9,.3,1); }
  .bar-track { fill: var(--track); }
  .bar-val { fill: url(#blueGrad); }
  .bar-today { fill: #2f77c4; }
  .tick { font-family: 'Noto Sans JP', sans-serif; font-size: 10px; font-weight: 500; fill: var(--ink-faint); }
  .barcount { font-family: 'Noto Sans JP', sans-serif; font-size: 10px; font-weight: 700; fill: var(--blue-strong); }

  .empty-note { text-align: center; color: var(--ink-soft); font-size: 14px; padding: 34px 10px; line-height: 1.9; }

  /* フッター操作 */
  .tools { display: flex; justify-content: center; gap: 10px; margin-top: 22px; flex-wrap: wrap; }
  .tools button {
    background: #fff; border: 1px solid var(--line); border-radius: 10px; cursor: pointer;
    font-size: 12px; font-weight: 500; color: var(--ink-soft); padding: 9px 16px;
    transition: all .18s ease;
  }
  .tools button:hover { border-color: var(--blue-soft); color: var(--blue-strong); }
  .tools .danger:hover { border-color: var(--danger); color: var(--danger); }

  footer { text-align: center; margin-top: 28px; font-size: 12px; color: var(--ink-faint); line-height: 1.9; }

  /* トースト */
  .toast {
    position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%) translateY(20px);
    background: #fff; border: 1px solid var(--blue-soft); color: var(--blue-strong);
    font-size: 14px; font-weight: 500; padding: 12px 22px; border-radius: 12px;
    opacity: 0; pointer-events: none; transition: opacity .25s ease, transform .25s ease;
    z-index: 50; box-shadow: 0 12px 34px rgba(47,119,196,0.22);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">返信トラッカー</div>
    <h1>返信できた！</h1>
  </header>

  <!-- 合計（主役） -->
  <div class="hero">
    <div class="hero-label">これまでの累計返信</div>
    <div class="hero-num-row"><span class="hero-num" id="totalNum">0</span><span class="hero-unit">回</span></div>
    <div class="hero-sub" id="heroSub">最初の一通から始めよう。</div>
  </div>

  <!-- ボタン -->
  <div class="btn-zone">
    <button type="button" class="reply-btn" id="replyBtn">
      <span class="ico">✓</span>返信できた
    </button>
    <div class="float1" id="float1">+1</div>
    <div>
      <button type="button" class="undo" id="undoBtn" disabled>直前の1回を取り消す</button>
    </div>
  </div>

  <!-- 統計 -->
  <div class="stats">
    <div class="stat accent"><div class="n" id="todayNum">0</div><div class="l">今日</div></div>
    <div class="stat"><div class="n" id="streakNum">0</div><div class="l">連続日数</div></div>
    <div class="stat"><div class="n" id="bestNum">0</div><div class="l">1日の最高</div></div>
  </div>

  <!-- グラフ -->
  <div class="chart-card">
    <div class="chart-head">
      <h2>1日ごとの返信数</h2>
      <div class="rangebar" id="rangeBar">
        <button type="button" data-days="7">7日</button>
        <button type="button" data-days="14" class="active">14日</button>
        <button type="button" data-days="30">30日</button>
      </div>
    </div>
    <div id="chartArea"></div>
  </div>

  <div class="tools">
    <button type="button" id="exportBtn">データを書き出す</button>
    <button type="button" id="importBtn">読み込む</button>
    <button type="button" class="danger" id="resetBtn">リセット</button>
  </div>

  <footer>
    記録はこの端末のブラウザ内に自動保存されます（サーバー送信なし）。<br>
    同じブラウザで開けば、いつでも続きから記録できます。
  </footer>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="fileInput" accept="application/json" style="display:none">

<script>
(function () {
  "use strict";

  var KEY = "reply_tracker_v1";
  var MAX_HISTORY = 400;

  var state = load();
  var rangeDays = 14;

  function todayKey(d) {
    d = d || new Date();
    var y = d.getFullYear();
    var m = String(d.getMonth() + 1).padStart(2, "0");
    var day = String(d.getDate()).padStart(2, "0");
    return y + "-" + m + "-" + day;
  }

  function load() {
    try {
      var raw = localStorage.getItem(KEY);
      if (!raw) raw = localStorage.getItem("soulound_reply_tracker_v1"); // 旧キーからの移行
      if (raw) {
        var s = JSON.parse(raw);
        if (s && typeof s === "object") {
          s.total = s.total || 0;
          s.daily = s.daily || {};
          s.log = s.log || [];
          return s;
        }
      }
    } catch (e) {}
    return { total: 0, daily: {}, log: [] };
  }

  function save() {
    try { localStorage.setItem(KEY, JSON.stringify(state)); }
    catch (e) { toast("保存できませんでした（プライベートモード？）"); }
  }

  function addOne() {
    var k = todayKey();
    state.daily[k] = (state.daily[k] || 0) + 1;
    state.total += 1;
    state.log.push(Date.now());
    if (state.log.length > MAX_HISTORY) state.log = state.log.slice(-MAX_HISTORY);
    save();
  }

  function undoOne() {
    if (state.total <= 0) return false;
    var k = todayKey();
    if (!state.daily[k]) { toast("今日の記録がないため取り消せません"); return false; }
    state.daily[k] -= 1;
    if (state.daily[k] <= 0) delete state.daily[k];
    state.total = Math.max(0, state.total - 1);
    if (state.log.length) state.log.pop();
    save();
    return true;
  }

  function computeStreak() {
    var streak = 0;
    var d = new Date();
    if (!state.daily[todayKey(d)]) d.setDate(d.getDate() - 1);
    while (state.daily[todayKey(d)]) {
      streak += 1;
      d.setDate(d.getDate() - 1);
    }
    return streak;
  }

  function bestDay() {
    var best = 0;
    for (var k in state.daily) if (state.daily[k] > best) best = state.daily[k];
    return best;
  }

  function lastNDays(n) {
    var arr = [];
    var d = new Date();
    for (var i = n - 1; i >= 0; i--) {
      var dd = new Date(d);
      dd.setDate(d.getDate() - i);
      var k = todayKey(dd);
      arr.push({ key: k, date: dd, count: state.daily[k] || 0 });
    }
    return arr;
  }

  var totalNum = document.getElementById("totalNum");
  var heroSub = document.getElementById("heroSub");
  var todayNum = document.getElementById("todayNum");
  var streakNum = document.getElementById("streakNum");
  var bestNum = document.getElementById("bestNum");
  var undoBtn = document.getElementById("undoBtn");

  function heroMessage(total, today) {
    if (total === 0) return "最初の一通から始めよう。";
    if (today === 0) return "今日はまだ0回。ひと息ついたら、一通いこう。";
    if (today >= 10) return "今日はすごい。よくやりきった。";
    if (today >= 5) return "いい流れ。今日もしっかり返せている。";
    if (today >= 1) return "その一通、ちゃんと届いた。えらい。";
    return "";
  }

  function renderStats() {
    var today = state.daily[todayKey()] || 0;
    totalNum.textContent = state.total;
    todayNum.textContent = today;
    streakNum.textContent = computeStreak();
    bestNum.textContent = bestDay();
    heroSub.textContent = heroMessage(state.total, today);
    undoBtn.disabled = today <= 0;
  }

  var chartArea = document.getElementById("chartArea");

  function renderChart() {
    var data = lastNDays(rangeDays);
    var hasAny = data.some(function (d) { return d.count > 0; });
    if (!hasAny && state.total === 0) {
      chartArea.innerHTML = '<div class="empty-note">まだ記録がありません。<br>「返信できた」を押すと、ここに今日の棒が立ち上がります。</div>';
      return;
    }

    var W = 660, H = 240;
    var padL = 4, padR = 4, padTop = 22, padBottom = 26;
    var innerW = W - padL - padR;
    var innerH = H - padTop - padBottom;
    var n = data.length;
    var slot = innerW / n;
    var barW = Math.min(slot * 0.6, 28);
    var maxVal = Math.max(1, data.reduce(function (m, d) { return Math.max(m, d.count); }, 0));
    var tk = todayKey();
    var showEveryLabel = n <= 14;

    var svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" role="img" aria-label="1日ごとの返信数の棒グラフ">';
    svg += '<defs><linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">' +
           '<stop offset="0%" stop-color="#6aa6e6"/><stop offset="100%" stop-color="#4a90d9"/>' +
           '</linearGradient></defs>';

    var baseY = padTop + innerH;
    svg += '<line x1="' + padL + '" y1="' + baseY + '" x2="' + (W - padR) + '" y2="' + baseY + '" stroke="#e2eaf3" stroke-width="1"/>';

    for (var i = 0; i < n; i++) {
      var d = data[i];
      var cx = padL + slot * i + slot / 2;
      var x = cx - barW / 2;
      var h = (d.count / maxVal) * innerH;
      var y = baseY - h;
      var isToday = d.key === tk;

      svg += '<rect class="bar-track" x="' + x.toFixed(1) + '" y="' + padTop + '" width="' + barW.toFixed(1) +
             '" height="' + innerH + '" rx="4"/>';

      if (d.count > 0) {
        svg += '<rect class="bar ' + (isToday ? 'bar-today' : 'bar-val') + '" x="' + x.toFixed(1) +
               '" y="' + y.toFixed(1) + '" width="' + barW.toFixed(1) + '" height="' + h.toFixed(1) + '" rx="4">' +
               '<title>' + d.key + '：' + d.count + '回</title></rect>';
        svg += '<text class="barcount" x="' + cx.toFixed(1) + '" y="' + (y - 6).toFixed(1) +
               '" text-anchor="middle">' + d.count + '</text>';
      }

      var label = (d.date.getMonth() + 1) + "/" + d.date.getDate();
      var drawLabel = showEveryLabel || i === 0 || i === n - 1 || (i % Math.ceil(n / 8) === 0);
      if (drawLabel) {
        svg += '<text class="tick" x="' + cx.toFixed(1) + '" y="' + (baseY + 16) +
               '" text-anchor="middle"' + (isToday ? ' fill="#2f77c4" font-weight="700"' : '') + '>' + label + '</text>';
      }
    }

    svg += '</svg>';
    chartArea.innerHTML = svg;
  }

  function renderAll() { renderStats(); renderChart(); }

  var replyBtn = document.getElementById("replyBtn");
  var float1 = document.getElementById("float1");
  var heroNum = totalNum;

  replyBtn.addEventListener("click", function () {
    addOne();
    renderAll();
    heroNum.classList.remove("pop"); void heroNum.offsetWidth; heroNum.classList.add("pop");
    replyBtn.classList.remove("flash"); void replyBtn.offsetWidth; replyBtn.classList.add("flash");
    float1.classList.remove("go"); void float1.offsetWidth; float1.classList.add("go");
    if (navigator.vibrate) { try { navigator.vibrate(12); } catch (e) {} }
  });

  undoBtn.addEventListener("click", function () {
    if (undoOne()) { renderAll(); toast("直前の1回を取り消しました"); }
  });

  document.getElementById("rangeBar").addEventListener("click", function (e) {
    var b = e.target.closest("button");
    if (!b) return;
    rangeDays = parseInt(b.getAttribute("data-days"), 10);
    [].forEach.call(this.querySelectorAll("button"), function (x) { x.classList.remove("active"); });
    b.classList.add("active");
    renderChart();
  });

  document.getElementById("exportBtn").addEventListener("click", function () {
    var blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "reply-tracker-" + todayKey() + ".json";
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    toast("データを書き出しました");
  });

  var fileInput = document.getElementById("fileInput");
  document.getElementById("importBtn").addEventListener("click", function () { fileInput.click(); });
  fileInput.addEventListener("change", function () {
    var f = fileInput.files && fileInput.files[0];
    if (!f) return;
    var reader = new FileReader();
    reader.onload = function () {
      try {
        var s = JSON.parse(reader.result);
        if (!s || typeof s !== "object" || typeof s.daily !== "object") throw new Error("bad");
        state = { total: s.total || 0, daily: s.daily || {}, log: s.log || [] };
        if (!s.total) {
          var sum = 0; for (var k in state.daily) sum += state.daily[k];
          state.total = sum;
        }
        save(); renderAll();
        toast("データを読み込みました");
      } catch (e) { toast("読み込めませんでした（形式が不正です）"); }
      fileInput.value = "";
    };
    reader.readAsText(f);
  });

  document.getElementById("resetBtn").addEventListener("click", function () {
    if (!confirm("すべての記録を消去します。よろしいですか？\n（先に「データを書き出す」でバックアップできます）")) return;
    state = { total: 0, daily: {}, log: [] };
    save(); renderAll();
    toast("記録をリセットしました");
  });

  var toastEl = document.getElementById("toast");
  var toastTimer = null;
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toastEl.classList.remove("show"); }, 2200);
  }

  window.addEventListener("storage", function (e) {
    if (e.key === KEY) { state = load(); renderAll(); }
  });
  document.addEventListener("visibilitychange", function () {
    if (!document.hidden) renderAll();
  });

  renderAll();
})();
</script>
</body>
</html>
