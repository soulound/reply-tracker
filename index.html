<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#eaf1fb">
<title>できた！トラッカー — 返信 & 欲求の我慢</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #eef4fc;
    --card: #ffffff;
    --ink: #1f2a37;
    --ink-soft: #5a6b7b;
    --ink-faint: #93a3b3;
    --line: #e2eaf3;
    --blue: #3f83cf;
    --blue-strong: #2f77c4;
    --blue-soft: #a9cbef;
    --blue-bg: #e8f1fc;
    --teal: #1fa88c;
    --teal-strong: #17907d;
    --teal-soft: #9fd9cd;
    --teal-bg: #e4f6f1;
    --track: #eef3f9;
    --shadow: 0 8px 30px rgba(47,119,196,0.10);
    --danger: #d9694f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { background: var(--bg); }
  button { -webkit-tap-highlight-color: rgba(74,144,217,0.2); touch-action: manipulation; font-family: inherit; }
  body {
    background: linear-gradient(180deg, #eef4fc 0%, #f7fafe 100%);
    background-attachment: fixed;
    color: var(--ink);
    font-family: 'Noto Sans JP', system-ui, -apple-system, 'Hiragino Kaku Gothic ProN', 'Yu Gothic', Meiryo, sans-serif;
    font-weight: 400;
    min-height: 100vh;
    padding: 30px 18px 80px;
    -webkit-text-size-adjust: 100%;
    overflow-x: hidden;
    line-height: 1.7;
  }

  .wrap { max-width: 680px; margin: 0 auto; }

  header { text-align: center; margin-bottom: 22px; }
  .eyebrow {
    display: inline-block;
    font-size: 12px; font-weight: 500; letter-spacing: 0.08em;
    color: var(--blue-strong); background: var(--blue-bg);
    padding: 5px 14px; border-radius: 999px;
  }
  h1 { font-weight: 700; font-size: 27px; margin-top: 14px; color: var(--ink); letter-spacing: 0.01em; }

  /* アクションカード（返信 / 我慢） */
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
  @media (max-width: 560px) { .cards { grid-template-columns: 1fr; } }

  .card {
    position: relative;
    background: var(--card); border: 1px solid var(--line); border-radius: 18px;
    box-shadow: var(--shadow); padding: 22px 18px 20px; text-align: center;
  }
  .card .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 7px; vertical-align: middle; }
  .card .clabel { font-size: 13px; font-weight: 700; color: var(--ink-soft); }
  .card .num-row { display: flex; align-items: baseline; justify-content: center; gap: 5px; margin: 6px 0 2px; }
  .card .num { font-size: 58px; line-height: 1; font-weight: 700; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; transition: transform .18s cubic-bezier(.2,1.4,.4,1); display: inline-block; }
  .card .unit { font-size: 19px; font-weight: 500; color: var(--ink-soft); }
  .card .num.pop { transform: scale(1.13); }
  .card .today { font-size: 12px; color: var(--ink-faint); margin-bottom: 16px; }
  .card .today b { font-weight: 700; }

  .card.reply .num, .card.reply .clabel { color: var(--blue-strong); }
  .card.reply .dot { background: var(--blue); }
  .card.resist .num, .card.resist .clabel { color: var(--teal-strong); }
  .card.resist .dot { background: var(--teal); }

  .act-btn {
    width: 100%; border: none; color: #fff; font-weight: 700; font-size: 17px;
    letter-spacing: 0.04em; padding: 16px 12px; border-radius: 13px; cursor: pointer;
    transition: transform .12s ease, box-shadow .3s ease, filter .2s ease;
  }
  .card.reply .act-btn { background: linear-gradient(180deg, #5a9be0, #3f83cf); box-shadow: 0 9px 22px rgba(47,119,196,0.26); }
  .card.resist .act-btn { background: linear-gradient(180deg, #35c0a6, #1fa88c); box-shadow: 0 9px 22px rgba(23,144,125,0.24); }
  .act-btn:hover { filter: brightness(1.04); }
  .act-btn:active { transform: scale(0.97); }
  .act-btn .ico { margin-right: 7px; }
  .card.reply .act-btn.flash { animation: flashB .5s ease; }
  .card.resist .act-btn.flash { animation: flashT .5s ease; }
  @keyframes flashB { 0% { box-shadow: 0 0 0 0 rgba(74,144,217,0.45); } 100% { box-shadow: 0 0 0 22px rgba(74,144,217,0); } }
  @keyframes flashT { 0% { box-shadow: 0 0 0 0 rgba(31,168,140,0.45); } 100% { box-shadow: 0 0 0 22px rgba(31,168,140,0); } }

  .undo {
    display: inline-block; margin-top: 12px; background: none; border: none; cursor: pointer;
    font-size: 12px; font-weight: 500; color: var(--ink-faint); transition: color .2s ease;
  }
  .card.reply .undo:hover:not(:disabled) { color: var(--blue-strong); }
  .card.resist .undo:hover:not(:disabled) { color: var(--teal-strong); }
  .undo:disabled { opacity: 0.4; cursor: default; }

  .float1 {
    position: absolute; left: 50%; bottom: 62px; transform: translateX(-50%);
    font-size: 28px; font-weight: 700; pointer-events: none; opacity: 0;
  }
  .card.reply .float1 { color: var(--blue-strong); }
  .card.resist .float1 { color: var(--teal-strong); }
  .float1.go { animation: rise 1s ease-out forwards; }
  @keyframes rise {
    0% { opacity: 0; transform: translate(-50%, 6px) scale(0.8); }
    18% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -46px) scale(1.05); }
  }

  .hero-sub { text-align: center; font-size: 14px; font-weight: 500; color: var(--ink-soft); margin: -4px 0 20px; }

  /* グラフ */
  .chart-card {
    background: var(--card); border: 1px solid var(--line); border-radius: 18px;
    box-shadow: var(--shadow); padding: 22px 16px 16px;
  }
  .chart-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 10px; }
  .chart-head h2 { font-size: 15px; font-weight: 700; color: var(--ink); }
  .rangebar { display: flex; background: var(--track); border-radius: 10px; padding: 3px; }
  .rangebar button {
    background: transparent; border: none; color: var(--ink-soft);
    font-size: 13px; font-weight: 500; padding: 6px 13px; cursor: pointer;
    border-radius: 8px; transition: all .18s ease;
  }
  .rangebar button.active { background: #fff; color: var(--blue-strong); box-shadow: 0 1px 4px rgba(47,119,196,0.14); }

  .legend { display: flex; gap: 18px; margin-bottom: 8px; padding-left: 4px; }
  .legend .item { display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 500; color: var(--ink-soft); }
  .legend .ldot { width: 20px; height: 3px; border-radius: 2px; position: relative; }
  .legend .ldot::after { content: ""; position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); width: 8px; height: 8px; border-radius: 50%; border: 2px solid #fff; }
  .legend .reply .ldot { background: var(--blue); } .legend .reply .ldot::after { background: var(--blue); }
  .legend .resist .ldot { background: var(--teal); } .legend .resist .ldot::after { background: var(--teal); }

  svg { width: 100%; height: auto; display: block; overflow: visible; }
  .empty-note { text-align: center; color: var(--ink-soft); font-size: 14px; padding: 34px 10px; line-height: 1.9; }

  /* フッター操作 */
  .tools { display: flex; justify-content: center; gap: 10px; margin-top: 22px; flex-wrap: wrap; }
  .tools button {
    background: #fff; border: 1px solid var(--line); border-radius: 10px; cursor: pointer;
    font-size: 12px; font-weight: 500; color: var(--ink-soft); padding: 9px 16px; transition: all .18s ease;
  }
  .tools button:hover { border-color: var(--blue-soft); color: var(--blue-strong); }
  .tools .danger:hover { border-color: var(--danger); color: var(--danger); }

  footer { text-align: center; margin-top: 26px; font-size: 12px; color: var(--ink-faint); line-height: 1.9; }

  .toast {
    position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%) translateY(20px);
    background: #fff; border: 1px solid var(--blue-soft); color: var(--blue-strong);
    font-size: 14px; font-weight: 500; padding: 12px 22px; border-radius: 12px;
    opacity: 0; pointer-events: none; transition: opacity .25s ease, transform .25s ease;
    z-index: 50; box-shadow: 0 12px 34px rgba(47,119,196,0.22);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">できた！トラッカー</div>
    <h1>返信できた・我慢できた</h1>
  </header>

  <div class="hero-sub" id="heroSub">ボタンを押して、できた回数を積み上げよう。</div>

  <div class="cards">
    <div class="card reply">
      <div><span class="dot"></span><span class="clabel">累計 返信できた</span></div>
      <div class="num-row"><span class="num" id="replyTotal">0</span><span class="unit">回</span></div>
      <div class="today">今日 <b id="replyToday">0</b> 回</div>
      <button type="button" class="act-btn" id="replyBtn"><span class="ico">✓</span>返信できた</button>
      <div class="float1" id="replyFloat">+1</div>
      <div><button type="button" class="undo" id="replyUndo" disabled>取り消す</button></div>
    </div>

    <div class="card resist">
      <div><span class="dot"></span><span class="clabel">累計 欲求を我慢</span></div>
      <div class="num-row"><span class="num" id="resistTotal">0</span><span class="unit">回</span></div>
      <div class="today">今日 <b id="resistToday">0</b> 回</div>
      <button type="button" class="act-btn" id="resistBtn"><span class="ico">✦</span>我慢できた</button>
      <div class="float1" id="resistFloat">+1</div>
      <div><button type="button" class="undo" id="resistUndo" disabled>取り消す</button></div>
    </div>
  </div>

  <div class="chart-card">
    <div class="chart-head">
      <h2>1日ごとの回数</h2>
      <div class="rangebar" id="rangeBar">
        <button type="button" data-days="7">7日</button>
        <button type="button" data-days="14" class="active">14日</button>
        <button type="button" data-days="30">30日</button>
      </div>
    </div>
    <div class="legend">
      <div class="item reply"><span class="ldot"></span>返信できた</div>
      <div class="item resist"><span class="ldot"></span>欲求を我慢</div>
    </div>
    <div id="chartArea"></div>
  </div>

  <div class="tools">
    <button type="button" id="exportBtn">データを書き出す</button>
    <button type="button" id="importBtn">読み込む</button>
    <button type="button" class="danger" id="resetBtn">リセット</button>
  </div>

  <footer>
    記録はこの端末のブラウザ内に自動保存されます（サーバー送信なし）。<br>
    同じブラウザで開けば、いつでも続きから記録できます。
  </footer>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="fileInput" accept="application/json" style="display:none">

<script>
(function () {
  "use strict";

  var KEY = "done_tracker_v2";
  var MAX_HISTORY = 400;

  var state = load();
  var rangeDays = 14;

  function todayKey(d) {
    d = d || new Date();
    var y = d.getFullYear();
    var m = String(d.getMonth() + 1).padStart(2, "0");
    var day = String(d.getDate()).padStart(2, "0");
    return y + "-" + m + "-" + day;
  }

  function emptyMetric() { return { total: 0, daily: {}, log: [] }; }

  function load() {
    // v2
    try {
      var raw = localStorage.getItem(KEY);
      if (raw) {
        var s = JSON.parse(raw);
        if (s && s.reply && s.resist) {
          s.reply = normMetric(s.reply);
          s.resist = normMetric(s.resist);
          return s;
        }
      }
    } catch (e) {}
    // v1 からの移行（返信のみ記録されていた）
    try {
      var old = localStorage.getItem("reply_tracker_v1") || localStorage.getItem("soulound_reply_tracker_v1");
      if (old) {
        var o = JSON.parse(old);
        if (o && typeof o === "object") {
          return { reply: normMetric(o), resist: emptyMetric() };
        }
      }
    } catch (e) {}
    return { reply: emptyMetric(), resist: emptyMetric() };
  }

  function normMetric(m) {
    m = m || {};
    return { total: m.total || 0, daily: m.daily || {}, log: m.log || [] };
  }

  function save() {
    try { localStorage.setItem(KEY, JSON.stringify(state)); }
    catch (e) { toast("保存できませんでした（プライベートモード？）"); }
  }

  function addOne(metric) {
    var m = state[metric];
    var k = todayKey();
    m.daily[k] = (m.daily[k] || 0) + 1;
    m.total += 1;
    m.log.push(Date.now());
    if (m.log.length > MAX_HISTORY) m.log = m.log.slice(-MAX_HISTORY);
    save();
  }

  function undoOne(metric) {
    var m = state[metric];
    var k = todayKey();
    if (!m.daily[k]) { toast("今日の記録がないため取り消せません"); return false; }
    m.daily[k] -= 1;
    if (m.daily[k] <= 0) delete m.daily[k];
    m.total = Math.max(0, m.total - 1);
    if (m.log.length) m.log.pop();
    save();
    return true;
  }

  function lastNDays(n) {
    var arr = [];
    var d = new Date();
    for (var i = n - 1; i >= 0; i--) {
      var dd = new Date(d);
      dd.setDate(d.getDate() - i);
      var k = todayKey(dd);
      arr.push({ key: k, date: dd, reply: state.reply.daily[k] || 0, resist: state.resist.daily[k] || 0 });
    }
    return arr;
  }

  // ---- 参照 ----
  var replyTotal = document.getElementById("replyTotal");
  var resistTotal = document.getElementById("resistTotal");
  var replyToday = document.getElementById("replyToday");
  var resistToday = document.getElementById("resistToday");
  var replyUndo = document.getElementById("replyUndo");
  var resistUndo = document.getElementById("resistUndo");
  var heroSub = document.getElementById("heroSub");
  var chartArea = document.getElementById("chartArea");

  function heroMessage() {
    var tk = todayKey();
    var r = state.reply.daily[tk] || 0;
    var g = state.resist.daily[tk] || 0;
    if (state.reply.total === 0 && state.resist.total === 0) return "ボタンを押して、できた回数を積み上げよう。";
    if (r === 0 && g === 0) return "今日はまだ0回。ひとつ「できた」を増やそう。";
    if (r + g >= 10) return "今日はよく頑張った。ちゃんと積み上がっている。";
    if (g >= 1 && r >= 1) return "返信も、我慢も。今日のあなた、えらい。";
    if (g >= 1) return "その我慢、価値がある。よく踏みとどまった。";
    return "その一通、ちゃんと届いた。えらい。";
  }

  function renderStats() {
    var tk = todayKey();
    replyTotal.textContent = state.reply.total;
    resistTotal.textContent = state.resist.total;
    replyToday.textContent = state.reply.daily[tk] || 0;
    resistToday.textContent = state.resist.daily[tk] || 0;
    replyUndo.disabled = !(state.reply.daily[tk] > 0);
    resistUndo.disabled = !(state.resist.daily[tk] > 0);
    heroSub.textContent = heroMessage();
  }

  function buildLine(data, field, W, padL, slot, baseY, innerH, maxVal) {
    var pts = [];
    for (var i = 0; i < data.length; i++) {
      var cx = padL + slot * i + slot / 2;
      var cy = baseY - (data[i][field] / maxVal) * innerH;
      pts.push([cx, cy]);
    }
    return pts;
  }

  function pathFrom(pts) {
    var dstr = "";
    for (var i = 0; i < pts.length; i++) {
      dstr += (i === 0 ? "M" : "L") + pts[i][0].toFixed(1) + "," + pts[i][1].toFixed(1) + " ";
    }
    return dstr.trim();
  }

  function renderChart() {
    var data = lastNDays(rangeDays);
    var anyData = state.reply.total > 0 || state.resist.total > 0;
    if (!anyData) {
      chartArea.innerHTML = '<div class="empty-note">まだ記録がありません。<br>ボタンを押すと、ここに折れ線が描かれていきます。</div>';
      return;
    }

    var W = 660, H = 250;
    var padL = 10, padR = 10, padTop = 18, padBottom = 26;
    var innerW = W - padL - padR;
    var innerH = H - padTop - padBottom;
    var n = data.length;
    var slot = innerW / n;
    var baseY = padTop + innerH;

    var maxVal = 1;
    for (var i = 0; i < n; i++) { maxVal = Math.max(maxVal, data[i].reply, data[i].resist); }

    var showEveryLabel = n <= 14;

    var svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" role="img" aria-label="返信できた回数と欲求を我慢した回数の折れ線グラフ">';

    // 目盛り線（0 と 最大）
    var gridVals = maxVal <= 4 ? range1(maxVal) : [0, Math.ceil(maxVal / 2), maxVal];
    for (var g = 0; g < gridVals.length; g++) {
      var gv = gridVals[g];
      var gy = baseY - (gv / maxVal) * innerH;
      svg += '<line x1="' + padL + '" y1="' + gy.toFixed(1) + '" x2="' + (W - padR) + '" y2="' + gy.toFixed(1) +
             '" stroke="' + (gv === 0 ? "#e2eaf3" : "#eef3f9") + '" stroke-width="1"/>';
      svg += '<text x="' + (padL - 4) + '" y="' + (gy + 3).toFixed(1) + '" text-anchor="end" font-size="9" font-family="Noto Sans JP, sans-serif" fill="#93a3b3">' + gv + '</text>';
    }

    // 日付ラベル
    for (var j = 0; j < n; j++) {
      var cx = padL + slot * j + slot / 2;
      var drawLabel = showEveryLabel || j === 0 || j === n - 1 || (j % Math.ceil(n / 8) === 0);
      if (drawLabel) {
        var label = (data[j].date.getMonth() + 1) + "/" + data[j].date.getDate();
        svg += '<text x="' + cx.toFixed(1) + '" y="' + (baseY + 16) + '" text-anchor="middle" font-size="10" font-family="Noto Sans JP, sans-serif" fill="#93a3b3">' + label + '</text>';
      }
    }

    var replyPts = buildLine(data, "reply", W, padL, slot, baseY, innerH, maxVal);
    var resistPts = buildLine(data, "resist", W, padL, slot, baseY, innerH, maxVal);

    svg += drawSeries(resistPts, data, "resist", "#1fa88c");
    svg += drawSeries(replyPts, data, "reply", "#3f83cf");

    svg += '</svg>';
    chartArea.innerHTML = svg;
  }

  function range1(max) { var a = []; for (var i = 0; i <= max; i++) a.push(i); return a; }

  function drawSeries(pts, data, field, color) {
    var s = '<path d="' + pathFrom(pts) + '" fill="none" stroke="' + color + '" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
    for (var i = 0; i < pts.length; i++) {
      var val = data[i][field];
      var r = val > 0 ? 4 : 2.5;
      s += '<circle cx="' + pts[i][0].toFixed(1) + '" cy="' + pts[i][1].toFixed(1) + '" r="' + r +
           '" fill="#fff" stroke="' + color + '" stroke-width="2">' +
           '<title>' + data[i].key + '｜' + (field === "reply" ? "返信" : "我慢") + ' ' + val + '回</title></circle>';
    }
    return s;
  }

  function renderAll() { renderStats(); renderChart(); }

  // ---- インタラクション ----
  function wire(metric, btnId, floatId, undoId) {
    var btn = document.getElementById(btnId);
    var flt = document.getElementById(floatId);
    var num = document.getElementById(metric + "Total");
    btn.addEventListener("click", function () {
      addOne(metric);
      renderAll();
      num.classList.remove("pop"); void num.offsetWidth; num.classList.add("pop");
      btn.classList.remove("flash"); void btn.offsetWidth; btn.classList.add("flash");
      flt.classList.remove("go"); void flt.offsetWidth; flt.classList.add("go");
      if (navigator.vibrate) { try { navigator.vibrate(12); } catch (e) {} }
    });
    document.getElementById(undoId).addEventListener("click", function () {
      if (undoOne(metric)) { renderAll(); toast("直前の1回を取り消しました"); }
    });
  }
  wire("reply", "replyBtn", "replyFloat", "replyUndo");
  wire("resist", "resistBtn", "resistFloat", "resistUndo");

  document.getElementById("rangeBar").addEventListener("click", function (e) {
    var b = e.target.closest("button");
    if (!b) return;
    rangeDays = parseInt(b.getAttribute("data-days"), 10);
    [].forEach.call(this.querySelectorAll("button"), function (x) { x.classList.remove("active"); });
    b.classList.add("active");
    renderChart();
  });

  document.getElementById("exportBtn").addEventListener("click", function () {
    var blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = "done-tracker-" + todayKey() + ".json";
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    toast("データを書き出しました");
  });

  var fileInput = document.getElementById("fileInput");
  document.getElementById("importBtn").addEventListener("click", function () { fileInput.click(); });
  fileInput.addEventListener("change", function () {
    var f = fileInput.files && fileInput.files[0];
    if (!f) return;
    var reader = new FileReader();
    reader.onload = function () {
      try {
        var s = JSON.parse(reader.result);
        if (s && s.reply && s.resist) {
          state = { reply: normMetric(s.reply), resist: normMetric(s.resist) };
        } else if (s && typeof s.daily === "object") { // 旧形式（返信のみ）
          state = { reply: normMetric(s), resist: emptyMetric() };
        } else { throw new Error("bad"); }
        save(); renderAll();
        toast("データを読み込みました");
      } catch (e) { toast("読み込めませんでした（形式が不正です）"); }
      fileInput.value = "";
    };
    reader.readAsText(f);
  });

  document.getElementById("resetBtn").addEventListener("click", function () {
    if (!confirm("すべての記録を消去します。よろしいですか？\n（先に「データを書き出す」でバックアップできます）")) return;
    state = { reply: emptyMetric(), resist: emptyMetric() };
    save(); renderAll();
    toast("記録をリセットしました");
  });

  var toastEl = document.getElementById("toast");
  var toastTimer = null;
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toastEl.classList.remove("show"); }, 2200);
  }

  window.addEventListener("storage", function (e) { if (e.key === KEY) { state = load(); renderAll(); } });
  document.addEventListener("visibilitychange", function () { if (!document.hidden) renderAll(); });

  renderAll();
})();
</script>
</body>
</html>
